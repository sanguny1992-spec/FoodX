```html
<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>FoodX WEB</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:20px;
}

    margin-bottom:20px;
    font-size:34px;
}

.topbar{
    display:flex;
    gap:10px;
    margin-bottom:24px;
}

.topbar button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#ff9500,#ff5e3a);

    cursor:pointer;

}

.card{
    background:#1b1b1b;

    backdrop-filter:blur(12px);
}

    font-size:24px;

}

}

}

    margin-top:18px;
}

.section h3{
    margin-bottom:10px;
    color:#ff9500;
}

.ingredient{
    background:#262626;
    border-radius:14px;
    padding:10px;
    margin-bottom:8px;
}

    line-height:1.6;
    opacity:0.92;
}

.search{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#1d1d1d;
    color:white;
    margin-bottom:20px;
    font-size:16px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-top:20px;
}

.day{
    background:#1d1d1d;
    border-radius:14px;
    padding:14px;
    text-align:center;
}

.active{
    background:#22c55e;
    color:black;
    font-weight:700;
}

.select{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#1d1d1d;
    color:white;
    margin-bottom:16px;
    font-size:16px;
}

.login{
    max-width:420px;
    margin:100px auto;
}

.login button{
    width:100%;
    padding:16px;

}

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
    getAuth,
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {

    apiKey: "AIzaSyCbu1jS4WTke68HfYr_Oo9hGriOGJ6b8MM",

    authDomain: "foodxnew.firebaseapp.com",

    projectId: "foodxnew",

    storageBucket: "foodxnew.firebasestorage.app",

    messagingSenderId: "854058063966",

    appId: "1:854058063966:web:97ef85b42195c6ff687ccf"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const restaurantId = "6A0C27E2-2B87-4EB3-9576-6AC17129727D";

let menuUnsubscribe = null;
let semiUnsubscribe = null;
let scheduleUnsubscribe = null;

function renderTopbar(){

    return `
        <div class="topbar">
            <button onclick="loadMenu()">Меню</button>
            <button onclick="loadSemi()">Полуфабрикаты</button>
            <button onclick="loadSchedule()">График</button>
        </div>
    `;
}

// LOGIN

function showLogin(){

    document.body.innerHTML = `

        <div class="login">

            <h1>FoodX WEB</h1>

            <input id="email" class="search" placeholder="Email">

            <input id="password" type="password" class="search" placeholder="Password">

            <button id="loginBtn">Войти</button>

            <div id="error" class="error"></div>

        </div>
    `;

    document.getElementById("loginBtn").onclick = login;
}

async function login(){

    const email = document.getElementById("email").value;

    const password = document.getElementById("password").value;

    try{

        const result = await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        const uid = result.user.uid;

        const employeeRef = doc(
            db,
            "restaurants",
            restaurantId,
            "employees",
            uid
        );

        onSnapshot(employeeRef, snap => {

            if(!snap.exists()){

                document.getElementById("error").innerText =
                    "Сотрудник не найден";

                return;
            }

            const employee = snap.data();

            if(employee.status !== "approved"){

                document.getElementById("error").innerText =
                    "Доступ не подтвержден";

                return;
            }

            loadMenu();
        });

    }catch(error){

        document.getElementById("error").innerText = error.message;
    }
}

// MENU

window.loadMenu = function(){

    if(menuUnsubscribe) menuUnsubscribe();

    const ref = doc(db,"menus","main");

    menuUnsubscribe = onSnapshot(ref,snap => {

        if(!snap.exists()){

            document.body.innerHTML =
                `<div class="loading">Меню пустое</div>`;

            return;
        }

        const data = snap.data();

        const dishes = data.dishes || [];

        document.body.innerHTML = `

            ${renderTopbar()}

            <h1>Меню</h1>

            <input id="search" class="search" placeholder="Поиск блюда">

            <div id="content"></div>
        `;

        const content = document.getElementById("content");

        const search = document.getElementById("search");

        function render(filter = ""){

            content.innerHTML = "";

            dishes
                .filter(d =>
                    d.name.toLowerCase()
                    .includes(filter.toLowerCase())
                )
                .forEach(dish => {

                let ingredientsHTML = "";

                (dish.ingredients || []).forEach(i => {

                    ingredientsHTML += `
                        <div class="ingredient">
                            ${i.name} — ${i.grams} г
                        </div>
                    `;
                });

                content.innerHTML += `

                    <div class="card">

                        <div class="title">${dish.name}</div>

                        <div class="category">
                            ${dish.category || "Без категории"}
                        </div>

                        <div class="grams">
                            ${dish.grams || 0} г
                        </div>

                        <div class="section">

                            <h3>Ингредиенты</h3>

                            ${ingredientsHTML}

                        </div>

                        <div class="section">

                            <h3>Технология</h3>

                            <div class="instruction">
                                ${dish.instruction || "Нет описания"}
                            </div>

                        </div>

                    </div>
                `;
            });
        }

        render();

        search.oninput = e => {
            render(e.target.value);
        };
    });
};

// SEMI

window.loadSemi = function(){

    if(semiUnsubscribe) semiUnsubscribe();

    const ref = doc(db,"semi","main");

    semiUnsubscribe = onSnapshot(ref,snap => {

        if(!snap.exists()){

            document.body.innerHTML =
                `<div class="loading">Нет полуфабрикатов</div>`;

            return;
        }

        const data = snap.data();

        const semiProducts = data.semiProducts || [];

        document.body.innerHTML = `

            ${renderTopbar()}

            <h1>Полуфабрикаты</h1>

            <input id="search" class="search" placeholder="Поиск">

            <div id="content"></div>
        `;

        const content = document.getElementById("content");

        function render(filter = ""){

            content.innerHTML = "";

            semiProducts
                .filter(s =>
                    s.name.toLowerCase()
                    .includes(filter.toLowerCase())
                )
                .forEach(semi => {

                let ingredientsHTML = "";

                (semi.ingredients || []).forEach(i => {

                    ingredientsHTML += `
                        <div class="ingredient">
                            ${i.name} — ${i.grams} г
                        </div>
                    `;
                });

                content.innerHTML += `

                    <div class="card">

                        <div class="title">${semi.name}</div>

                        <div class="grams">
                            Выход: ${semi.grams || 0} г
                        </div>

                        <div class="section">

                            <h3>Ингредиенты</h3>

                            ${ingredientsHTML}

                        </div>

                        <div class="section">

                            <h3>Технология</h3>

                            <div class="instruction">
                                ${semi.instruction || "Нет описания"}
                            </div>

                        </div>

                    </div>
                `;
            });
        }

        render();

        document.getElementById("search").oninput = e => {
            render(e.target.value);
        };
    });
};

// SCHEDULE

window.loadSchedule = function(){

    if(scheduleUnsubscribe) scheduleUnsubscribe();

    const ref = doc(db,"schedules","main");

    scheduleUnsubscribe = onSnapshot(ref,snap => {

        if(!snap.exists()){

            document.body.innerHTML =
                `<div class="loading">Нет графика</div>`;

            return;
        }

        const data = snap.data();

        const employees = data.employees || [];

        document.body.innerHTML = `

            ${renderTopbar()}

            <h1>График</h1>

            <select id="employee" class="select"></select>

            <select id="month" class="select"></select>

            <div id="calendar"></div>
        `;

        const employeeSelect =
            document.getElementById("employee");

        const monthSelect =
            document.getElementById("month");

        const calendar =
            document.getElementById("calendar");

        employees.forEach((emp,index) => {

            const option = document.createElement("option");

            option.value = index;

            option.textContent = emp.name;

            employeeSelect.appendChild(option);
        });

        let currentEmployee = employees[0];

        function renderMonths(){

            monthSelect.innerHTML = "";

            const months =
                Object.keys(currentEmployee.monthDays || {});

            months.forEach(month => {

                const option = document.createElement("option");

                option.value = month;

                option.textContent = month;

                monthSelect.appendChild(option);
            });

            renderCalendar();
        }

        function renderCalendar(){

            const selectedMonth =
                monthSelect.value;

            const activeDays =
                currentEmployee.monthDays?.[selectedMonth] || [];

            let html = `<div class="calendar">`;

            for(let i=1;i<=31;i++){

                html += `
                    <div class="
                        day
                        ${activeDays.includes(i) ? "active" : ""}
                    ">
                        ${i}
                    </div>
                `;
            }

            html += `</div>`;

            calendar.innerHTML = html;
        }

        employeeSelect.onchange = () => {

            currentEmployee =
                employees[employeeSelect.value];

            renderMonths();
        };

        monthSelect.onchange = renderCalendar;

        renderMonths();
    });
};

showLogin();

</script>

</head>
